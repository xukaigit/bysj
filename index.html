<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>开题报告提交</title>
    <!-- 引入 Chart.js (全局) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <style>
        /* 样式完全保持不变，直接复制原样式（此处省略以节省篇幅，实际使用时请保留完整样式） */
        * { box-sizing: border-box; font-family: 'Segoe UI', Roboto, system-ui, sans-serif; }
        body { background: #e7eef7; margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .app-container { max-width: 1300px; width: 100%; }
        .public-submit { background: white; border-radius: 40px 40px 30px 30px; padding: 28px 32px 32px; margin-bottom: 28px; box-shadow: 0 15px 30px rgba(0,30,60,0.12); border: 1px solid #b9d5fd; }
        .public-submit h2 { font-size: 2rem; font-weight: 650; margin: 0 0 8px; color: #113355; display: flex; align-items: center; gap: 8px; }
        .public-submit h2::before { content: "📮"; font-size: 2rem; }
        .public-desc { color: #2a4f70; margin: 5px 0 25px; font-size: 1.15rem; border-left: 5px solid #2b82d9; padding-left: 20px; background: #e8f1fe; border-radius: 0 40px 40px 0; line-height: 1.5; width: fit-content; padding: 12px 30px; }
        .submit-form { display: flex; gap: 16px; flex-wrap: wrap; align-items: center; margin: 28px 0 16px; }
        #studentNameInput { flex: 2 1 280px; padding: 18px 28px; font-size: 1.2rem; border: 2px solid #b0caec; border-radius: 60px; outline: none; transition: 0.2s; background: #f6faff; }
        #studentNameInput:focus { border-color: #1e6bc7; box-shadow: 0 0 0 4px rgba(30,107,199,0.2); }
        #submitNameBtn { flex: 0 1 auto; background: #1f6c46; color: white; border: none; padding: 18px 38px; font-size: 1.2rem; font-weight: 600; border-radius: 60px; cursor: pointer; box-shadow: 0 10px 18px #1f6c4660; transition: 0.15s; border: 2px solid #1e8b3a; }
        #submitNameBtn:hover { background: #118c4a; transform: scale(1.02); }
        .submit-message { min-height: 50px; font-size: 1.1rem; color: #1e3b5e; background: #e2f0fa; border-radius: 40px; padding: 14px 28px; margin: 20px 0 15px; border-left: 8px solid #328fdc; }
        .public-summary { background: #ecf3fb; border-radius: 50px; padding: 12px 28px; font-size: 1.2rem; color: #103459; font-weight: 500; display: inline-block; }
        .public-summary span { font-weight: 700; font-size: 1.6rem; background: #2966a3; color: white; padding: 4px 18px; border-radius: 40px; margin-left: 12px; }
        .chart-row { display: flex; justify-content: space-around; flex-wrap: wrap; gap: 20px; margin: 40px 0 30px; padding: 20px 10px; background: #f5faff; border-radius: 60px; }
        .chart-card { flex: 1 1 200px; min-width: 180px; max-width: 260px; text-align: center; background: white; border-radius: 40px; padding: 20px 15px 20px; box-shadow: 0 10px 22px rgba(0,40,80,0.1); }
        .chart-card h4 { font-size: 1.5rem; margin: 0 0 5px; color: #113a5e; }
        .chart-card .teacher-name { font-size: 1rem; color: #4d6a8f; margin-bottom: 15px; font-weight: 500; }
        .chart-container { position: relative; width: 100%; aspect-ratio: 1/1; margin: 0 auto; }
        .chart-percent { font-size: 1.4rem; font-weight: 650; color: #1c4e7c; margin-top: 10px; }
        .private-section { background: #dbe6f2; border-radius: 40px; box-shadow: 0 20px 35px rgba(0,25,55,0.3); border: 3px solid #31578b; overflow: hidden; backdrop-filter: blur(2px); margin-top: 30px; }
        .private-header { background: #1f3b5c; color: white; padding: 18px 32px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 20px; }
        .private-header h3 { font-size: 1.8rem; margin: 0; font-weight: 550; display: flex; align-items: center; gap: 12px; }
        .private-header h3::before { content: "🔒"; font-size: 2rem; }
        .lock-toggle-area { display: flex; align-items: center; gap: 16px; }
        #unlockBtn, #lockBtn { background: white; border: none; padding: 14px 34px; border-radius: 50px; font-weight: 600; font-size: 1.1rem; cursor: pointer; transition: 0.1s; box-shadow: 0 5px 12px rgba(0,0,0,0.25); border: 2px solid #9dc0f0; }
        #unlockBtn { background: #f6d758; color: #1e3b5e; }
        #lockBtn { background: #bccfe6; color: #192e46; }
        #unlockBtn:hover { background: #ffc107; }
        #lockBtn:hover { background: #a5bbd9; }
        .password-box { display: flex; gap: 10px; align-items: center; background: #2f5075; padding: 8px 20px; border-radius: 50px; }
        .password-box input { padding: 12px 16px; border-radius: 40px; border: none; width: 220px; font-size: 1.1rem; background: #ebf3ff; border: 2px solid #95b6e3; }
        .password-box button { background: #92b9f2; border: none; padding: 12px 24px; border-radius: 40px; font-weight: 600; cursor: pointer; font-size: 1rem; }
        .password-box button:hover { background: #b3d0ff; }
        .password-error { color: #ffb9a7; margin-left: 16px; font-weight: 500; }
        .private-content { padding: 28px 28px 20px; background: white; transition: all 0.2s; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin: 22px 0 28px; }
        .group-card { background: white; border-radius: 28px; padding: 0 0 18px 0; box-shadow: 0 8px 20px rgba(0,20,50,0.08); border: 1px solid rgba(59,130,246,0.15); transition: transform 0.1s ease; }
        .group-card:hover { box-shadow: 0 18px 30px -8px rgba(0,80,160,0.2); }
        .group-header { background: linear-gradient(145deg, #f9fcff, #eef4fe); padding: 20px 22px 14px 22px; border-radius: 28px 28px 24px 24px; border-bottom: 2px dashed #a9c9fa; }
        .group-name { font-size: 1.8rem; font-weight: 650; color: #0c2b4f; display: flex; justify-content: space-between; align-items: center; letter-spacing: -0.01em; }
        .teacher-badge { background: #1e4f8a; color: white; padding: 8px 20px; border-radius: 40px; font-size: 0.9rem; font-weight: 500; box-shadow: 0 4px 8px #1e4f8a40; }
        .teacher-info { font-size: 1.2rem; font-weight: 400; margin-top: 6px; color: #2e4b74; display: flex; align-items: center; gap: 6px; }
        .teacher-info i { font-size: 1.4rem; color: #3b82f6; }
        .progress-badge { margin-top: 14px; background: #d9e9ff; border-radius: 30px; padding: 10px 14px; font-weight: 550; color: #10355e; display: flex; align-items: center; justify-content: space-between; }
        .student-list { padding: 10px 16px 8px 16px; }
        .student-row { display: flex; align-items: center; justify-content: space-between; padding: 12px 12px 12px 20px; margin: 8px 0; background: #fafcff; border-radius: 60px; border: 1px solid #dde7f5; transition: all 0.15s; }
        .student-row:hover { background: #eef5ff; border-color: #80b4ff; }
        .student-name { font-weight: 550; color: #1f2e4e; font-size: 1.1rem; display: flex; align-items: center; gap: 6px; }
        .student-name::before { content: "👤"; font-size: 0.95rem; opacity: 0.9; }
        .toggle-submit { appearance: none; background: #e9ecf3; width: 64px; height: 32px; border-radius: 40px; position: relative; cursor: pointer; transition: 0.2s; border: 2px solid #b3c7e3; outline: none; box-shadow: inset 0 1px 4px #0000001a; }
        .toggle-submit:checked { background: #1c8b3c; border-color: #0f6b2c; }
        .toggle-submit::after { content: "未交"; position: absolute; top: 4px; left: 8px; font-size: 0.7rem; font-weight: bold; color: #2e405b; text-transform: uppercase; transition: 0.2s; }
        .toggle-submit:checked::after { content: "已交"; left: 30px; color: white; text-shadow: 0 1px 2px black; }
        .toggle-submit::before { content: ""; position: absolute; width: 24px; height: 24px; background: white; top: 2px; left: 2px; border-radius: 50%; box-shadow: 0 2px 5px #00000033; transition: 0.2s; z-index: 2; }
        .toggle-submit:checked::before { left: 34px; }
        .group-footer { display: flex; justify-content: center; margin: 12px 18px 6px; }
        .notify-btn { background: white; border: 2px solid #3b82f6; color: #3b82f6; font-weight: 650; font-size: 1rem; padding: 14px 10px; border-radius: 48px; width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.15s; cursor: pointer; box-shadow: 0 4px 6px #00000008; }
        .notify-btn.active { background: #3b82f6; color: white; box-shadow: 0 12px 20px -14px #1e4f8a; border-color: #1e4f8a; }
        .notify-btn.active:hover { background: #2563eb; transform: scale(1.02); }
        .notify-btn.disabled, .notify-btn:disabled { opacity: 0.4; pointer-events: none; border-color: #a0b8d4; color: #6f89a6; background: #f0f4fb; }
        .notify-icon { font-size: 1.3rem; line-height: 1; }
        .master-actions { display: flex; gap: 12px; justify-content: flex-end; align-items: center; margin-top: 30px; border-top: 2px solid #cdddec; padding-top: 24px; }
        .action-btn { background: white; border: 1.5px solid #315d8f; padding: 14px 32px; border-radius: 50px; font-weight: 600; color: #1e3b5e; cursor: pointer; transition: 0.15s; font-size: 1rem; display: inline-flex; align-items: center; gap: 8px; box-shadow: 0 4px 8px #b0c7e5; }
        .action-btn:hover { background: #e2edff; border-color: #0f2f55; }
        .status-summary { background: #eaf2ff; border-radius: 60px; padding: 8px 28px; font-weight: 500; color: #10355e; font-size: 1.2rem; }
        .footer-note { text-align: right; color: #6785a8; margin-top: 24px; font-size: 0.95rem; }
        .notification-panel { background: #e2f0fa; border-radius: 40px; padding: 14px 28px; margin: 20px 0 0; font-weight: 480; color: #0e3e6b; border-left: 6px solid #1e8b4c; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
        .notification-panel .badge { background: #1c4e7c; color: white; border-radius: 30px; padding: 6px 22px; font-size: 0.95rem; }
        @media (max-width: 900px) { .grid-3 { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="app-container">
    <!-- 公共提交区 (学生使用) -->
    <div class="public-submit">
        <h2>已提交开题报告登记</h2>
        <div class="public-desc">🔹 输入你的完整姓名并点击提交，即可登记完成。</div>
        <div class="submit-form">
            <input type="text" id="studentNameInput" placeholder="例如：徐凯晟" autocomplete="off">
            <button id="submitNameBtn">📤 提交我的开题报告</button>
        </div>
        <div class="submit-message" id="submitMessage">✨ 等待输入...</div>
        <div class="public-summary">目前已有 <span id="publicSubmittedCount">0</span> 名同学提交</div>

        <!-- 三个圆形比例图卡片区 -->
        <div class="chart-row" id="chartRow">
            <div class="chart-card">
                <h4>第一组 </h4>
                <div class="teacher-name">周小四</div>
                <div class="chart-container">
                    <canvas id="chartGroup0"></canvas>
                </div>
                <div class="chart-percent" id="percentGroup0">0%</div>
            </div>
            <div class="chart-card">
                <h4>第二组 </h4>
                <div class="teacher-name">廖家英</div>
                <div class="chart-container">
                    <canvas id="chartGroup1"></canvas>
                </div>
                <div class="chart-percent" id="percentGroup1">0%</div>
            </div>
            <div class="chart-card">
                <h4>第三组</h4>
                <div class="teacher-name">袁泽宇</div>
                <div class="chart-container">
                    <canvas id="chartGroup2"></canvas>
                </div>
                <div class="chart-percent" id="percentGroup2">0%</div>
            </div>
        </div>
    </div>

    <!-- 负责人隐私区 (需解锁) -->
    <div class="private-section">
        <div class="private-header">
            <h3>负责人面板 · 分组详情</h3>
            <div class="lock-toggle-area" id="lockToggleArea"></div>
        </div>
        <!-- 隐私内容 (默认隐藏) -->
        <div id="privateContent" class="private-content" style="display: none;">
            <div class="grid-3" id="groupsContainer"></div>
            <div class="master-actions">
                <div class="status-summary" id="totalProgress">✅ 总计提交: 0/18</div>
                <button class="action-btn" id="mockAllSubmitted">🧪 模拟全部提交</button>
                <button class="action-btn" id="resetAll">🔄 重置所有状态</button>
            </div>
            <div class="notification-panel">
                <span class="badge">📢 最近通知</span>
                <span id="liveNotify">就绪</span>
            </div>
            <div class="footer-note">
                * 每组全部6人提交后通知按钮点亮 (仅负责人可见)
            </div>
        </div>
    </div>
</div>

<script type="module">
    // ---------- 模块化导入 Firebase (版本 12.10.0) ----------
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";
    // 如果不需要 analytics，可以不导入；若需要可取消注释下一行
    // import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-analytics.js";

    // 你的 Firebase 配置
    const firebaseConfig = {
        apiKey: "AIzaSyDsyWunkWwoniAh0dQqwQggST-OxWBK1KU",
        authDomain: "bysj-ad723.firebaseapp.com",
        projectId: "bysj-ad723",
        storageBucket: "bysj-ad723.firebasestorage.app",
        messagingSenderId: "69414844571",
        appId: "1:69414844571:web:1f486a725e02eb71172e3e",
        measurementId: "G-Q04245901B"
    };

    // 初始化 Firebase
    const app = initializeApp(firebaseConfig);
    // const analytics = getAnalytics(app); // 可选

    // 获取数据库引用
    const db = getDatabase(app);
    const statusRef = ref(db, 'submitStatus');

    // ---------- 密码 ----------
    const PRIVATE_PASSWORD = "88888888";

    // ---------- 学生名单 ----------
    const STUDENT_LIST = [
        { name: "徐凯晟", groupIdx: 0, teacher: "周小四" },
        { name: "胡睿佳", groupIdx: 0, teacher: "周小四" },
        { name: "吴雅雯", groupIdx: 0, teacher: "周小四" },
        { name: "吴帆", groupIdx: 0, teacher: "周小四" },
        { name: "陆映含", groupIdx: 0, teacher: "周小四" },
        { name: "贾茹袁奕", groupIdx: 0, teacher: "周小四" },
        { name: "于丽娜", groupIdx: 1, teacher: "廖家英" },
        { name: "徐浩文", groupIdx: 1, teacher: "廖家英" },
        { name: "莫雨", groupIdx: 1, teacher: "廖家英" },
        { name: "陈欣宇", groupIdx: 1, teacher: "廖家英" },
        { name: "成鑫艺", groupIdx: 1, teacher: "廖家英" },
        { name: "金文杰", groupIdx: 1, teacher: "廖家英" },
        { name: "迟阳", groupIdx: 2, teacher: "袁泽宇" },
        { name: "宗文豪", groupIdx: 2, teacher: "袁泽宇" },
        { name: "段雨瑞", groupIdx: 2, teacher: "袁泽宇" },
        { name: "解静茹", groupIdx: 2, teacher: "袁泽宇" },
        { name: "韩超", groupIdx: 2, teacher: "袁泽宇" },
        { name: "徐好", groupIdx: 2, teacher: "袁泽宇" }
    ];

    // 构建默认 groups 结构
    function buildDefaultGroups() {
        return [
            { groupName: "第一组", teacher: "周小四", students: [] },
            { groupName: "第二组", teacher: "廖家英", students: [] },
            { groupName: "第三组", teacher: "袁泽宇", students: [] }
        ];
    }

    function populateDefaultGroups(groups) {
        groups[0].students = [];
        groups[1].students = [];
        groups[2].students = [];
        STUDENT_LIST.forEach(item => {
            groups[item.groupIdx].students.push({ name: item.name, submitted: false });
        });
        return groups;
    }

    // 全局 groups 变量，由 Firebase 数据驱动
    let groups = populateDefaultGroups(buildDefaultGroups());

    // ---------- DOM 元素 ----------
    const privateContentDiv = document.getElementById('privateContent');
    const lockToggleArea = document.getElementById('lockToggleArea');
    const groupsContainer = document.getElementById('groupsContainer');
    const totalSpan = document.getElementById('totalProgress');
    const liveNotify = document.getElementById('liveNotify');
    const publicSubmittedSpan = document.getElementById('publicSubmittedCount');
    const submitMessage = document.getElementById('submitMessage');
    const studentNameInput = document.getElementById('studentNameInput');
    const submitBtn = document.getElementById('submitNameBtn');

    // 三个环形图 Canvas 及百分比显示
    const chartCanvases = [
        document.getElementById('chartGroup0'),
        document.getElementById('chartGroup1'),
        document.getElementById('chartGroup2')
    ];
    const percentSpans = [
        document.getElementById('percentGroup0'),
        document.getElementById('percentGroup1'),
        document.getElementById('percentGroup2')
    ];

    // Chart.js 实例数组
    let chartInstances = [null, null, null];

    // 解锁状态
    let isUnlocked = false;

    // ---------- 初始化环形图 ----------
    function initCharts() {
        const colors = ['#1e8b3c', '#e0e7f0'];
        for (let i = 0; i < 3; i++) {
            if (chartInstances[i]) {
                chartInstances[i].destroy();
            }
            const ctx = chartCanvases[i].getContext('2d');
            chartInstances[i] = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['已提交', '未提交'],
                    datasets: [{
                        data: [0, 6],
                        backgroundColor: [colors[0], colors[1]],
                        borderWidth: 0,
                        borderRadius: 8,
                        spacing: 4
                    }]
                },
                options: {
                    cutout: '70%',
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { display: false },
                        tooltip: { enabled: false }
                    },
                    layout: { padding: 6 }
                }
            });
        }
        updateCharts();
    }

    // 更新三个环形图数据
    function updateCharts() {
        for (let g = 0; g < 3; g++) {
            const group = groups[g];
            const submitted = group.students.filter(s => s.submitted).length;
            const total = group.students.length;
            const percent = Math.round((submitted / total) * 100);
            percentSpans[g].innerText = percent + '%';

            if (chartInstances[g]) {
                chartInstances[g].data.datasets[0].data = [submitted, total - submitted];
                chartInstances[g].update();
            }
        }
    }

    // 更新公共提交计数
    function updatePublicCount() {
        let total = 0;
        groups.forEach(g => total += g.students.filter(s => s.submitted).length);
        publicSubmittedSpan.innerText = total;
    }

    // 更新总计显示
    function updateTotalProgress() {
        let total = 0;
        groups.forEach(g => total += g.students.filter(s => s.submitted).length);
        totalSpan.innerText = `✅ 总计提交: ${total}/18`;
    }

    // ---------- 渲染负责人面板(分组卡片) ----------
    function renderPrivateGroups() {
        let htmlStr = '';
        for (let gIdx = 0; gIdx < groups.length; gIdx++) {
            const group = groups[gIdx];
            const fullySubmitted = group.students.every(s => s.submitted);
            const submittedCount = group.students.filter(s => s.submitted).length;

            let studentsHtml = '';
            group.students.forEach((student, sIdx) => {
                studentsHtml += `
                    <div class="student-row">
                        <span class="student-name">${student.name}</span>
                        <input type="checkbox" class="toggle-submit" 
                            data-group="${gIdx}" data-student="${sIdx}"
                            ${student.submitted ? 'checked' : ''}>
                    </div>
                `;
            });

            htmlStr += `
                <div class="group-card">
                    <div class="group-header">
                        <div class="group-name">
                            ${group.groupName}
                            <span class="teacher-badge">${group.teacher}</span>
                        </div>
                        <div class="teacher-info">
                            <i>👩‍🏫</i> 负责导师 · ${group.teacher}
                        </div>
                        <div class="progress-badge">
                            <span>📌 提交进度</span>
                            <span><strong>${submittedCount}/6</strong> 已交</span>
                        </div>
                    </div>
                    <div class="student-list">
                        ${studentsHtml}
                    </div>
                    <div class="group-footer">
                        <button class="notify-btn ${fullySubmitted ? 'active' : 'disabled'}" 
                            data-group="${gIdx}" ${fullySubmitted ? '' : 'disabled'}>
                            <span class="notify-icon">📨</span> 通知 ${group.teacher.split(' ')[0]} 审核
                        </button>
                    </div>
                </div>
            `;
        }
        groupsContainer.innerHTML = htmlStr;

        // 绑定复选框事件：修改本地 groups 并推送到 Firebase
        document.querySelectorAll('.toggle-submit').forEach(cb => {
            cb.addEventListener('change', function(e) {
                const g = parseInt(this.dataset.group);
                const s = parseInt(this.dataset.student);
                const newVal = this.checked;
                groups[g].students[s].submitted = newVal;
                // 推送到 Firebase，会触发其他设备更新
                set(statusRef, groups);
                liveNotify.innerText = `🔧 负责人已将 ${groups[g].students[s].name} 改为 ${newVal ? '已提交' : '未提交'}`;
            });
        });

        // 绑定通知按钮
        document.querySelectorAll('.notify-btn.active').forEach(btn => {
            btn.addEventListener('click', function(e) {
                const g = parseInt(this.dataset.group);
                const group = groups[g];
                liveNotify.innerText = `📨 已通知 ${group.teacher} (${group.groupName}) 审核`;
            });
        });

        // 重新绑定主操作按钮（模拟全部/重置）
        bindMasterActions();
    }

    // 绑定主操作按钮（模拟全部/重置）
    function bindMasterActions() {
        const mockBtn = document.getElementById('mockAllSubmitted');
        const resetBtn = document.getElementById('resetAll');
        if (mockBtn) {
            mockBtn.removeEventListener('click', mockAll);
            mockBtn.addEventListener('click', mockAll);
        }
        if (resetBtn) {
            resetBtn.removeEventListener('click', resetAllStates);
            resetBtn.addEventListener('click', resetAllStates);
        }
    }

    // ---------- 刷新所有 UI（图表、公共计数、总计、卡片） ----------
    function refreshAllUI() {
        updateCharts();
        updatePublicCount();
        updateTotalProgress();
        if (isUnlocked) {
            renderPrivateGroups();
        }
    }

    // ---------- Firebase 监听：任何变化都会触发此回调 ----------
    onValue(statusRef, (snapshot) => {
        const data = snapshot.val();
        if (data) {
            // 使用云端数据更新本地 groups
            groups = data;
        } else {
            // 首次使用，云端无数据，推默认数据
            groups = populateDefaultGroups(buildDefaultGroups());
            set(statusRef, groups);
        }
        // 刷新 UI
        refreshAllUI();
    });

    // ---------- 学生提交逻辑 ----------
    function handleStudentSubmit() {
        const rawName = studentNameInput.value.trim();
        if (!rawName) {
            submitMessage.innerText = '⚠️ 请输入姓名';
            return;
        }

        const normalized = rawName.replace(/\s+/g, '');
        let foundStudent = null;
        let foundGroupIdx = -1;
        let foundStudentIdx = -1;

        for (let g = 0; g < groups.length; g++) {
            for (let s = 0; s < groups[g].students.length; s++) {
                const stuName = groups[g].students[s].name.replace(/\s+/g, '');
                if (stuName.localeCompare(normalized, undefined, { sensitivity: 'accent' }) === 0) {
                    foundStudent = groups[g].students[s];
                    foundGroupIdx = g;
                    foundStudentIdx = s;
                    break;
                }
            }
            if (foundStudent) break;
        }

        if (!foundStudent) {
            submitMessage.innerText = '❌ 未找到该姓名，请确认你属于本次毕设名单。';
            return;
        }

        if (foundStudent.submitted) {
            submitMessage.innerText = `⏳ ${foundStudent.name} 你已经提交过了，无需重复提交。`;
            return;
        }

        // 修改本地
        foundStudent.submitted = true;
        // 推送到 Firebase
        set(statusRef, groups);
        submitMessage.innerText = `✅ 提交成功！${foundStudent.name}，你的开题报告已登记。`;
        studentNameInput.value = '';

        liveNotify.innerText = `👤 学生 ${foundStudent.name} 刚刚提交了开题报告。`;
    }

    // ---------- 解锁/锁定逻辑 ----------
    function buildLockUI() {
        if (isUnlocked) {
            lockToggleArea.innerHTML = `
                <button id="lockBtn">🔒 锁定面板</button>
            `;
            privateContentDiv.style.display = 'block';
            renderPrivateGroups();  // 立即渲染卡片
        } else {
            lockToggleArea.innerHTML = `
                <div class="password-box">
                    <input type="password" id="privatePassword" placeholder="负责人密码" />
                    <button id="unlockConfirmBtn">解锁</button>
                </div>
                <span class="password-error" id="passwordError"></span>
            `;
            privateContentDiv.style.display = 'none';
        }

        if (isUnlocked) {
            document.getElementById('lockBtn')?.addEventListener('click', () => {
                isUnlocked = false;
                buildLockUI();
            });
        } else {
            const unlockBtn = document.getElementById('unlockConfirmBtn');
            const pwdInput = document.getElementById('privatePassword');
            const errorSpan = document.getElementById('passwordError');
            if (unlockBtn) {
                unlockBtn.addEventListener('click', () => {
                    if (pwdInput.value === PRIVATE_PASSWORD) {
                        isUnlocked = true;
                        errorSpan.innerText = '';
                        buildLockUI();
                    } else {
                        errorSpan.innerText = '密码错误';
                    }
                    pwdInput.value = '';
                });
                pwdInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') unlockBtn.click();
                });
            }
        }
    }

    // ---------- 重置所有状态 (仅负责人) ----------
    function resetAllStates() {
        if (!isUnlocked) return;
        groups.forEach(g => g.students.forEach(s => s.submitted = false));
        set(statusRef, groups);
        liveNotify.innerText = '🔄 所有提交状态已重置';
    }

    // ---------- 模拟全部提交 (仅负责人) ----------
    function mockAll() {
        if (!isUnlocked) return;
        groups.forEach(g => g.students.forEach(s => s.submitted = true));
        set(statusRef, groups);
        liveNotify.innerText = '🧪 模拟全部提交完成';
    }

    // ---------- 初始化 ----------
    function init() {
        buildLockUI();
        initCharts();
        submitBtn.addEventListener('click', handleStudentSubmit);
        studentNameInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleStudentSubmit();
        });

        // 初始 UI 刷新（数据会由 Firebase 监听驱动，这里先显示默认）
        refreshAllUI();
    }

    init();
</script>
</body>
</html>
